services:
  wyoming-sherpa-onnx:
    build:
      context: .
      dockerfile: Dockerfile
    image: wyoming-sherpa-onnx:latest
    container_name: wyoming-sherpa-onnx
    restart: unless-stopped
    user: "0:0"
    ports:
      - "10300:10300"
    volumes:
      - ${HOME}/data/models:/app/data/models:rw
      - ${HOME}/data/speaker_refs:/data/speaker_refs:rw
    environment:
      - HOST=0.0.0.0
      - PORT=10300
      - MODEL_NAME=sherpa-onnx-qwen3-asr-0.6B-int8
      - HOTWORDS=
      - SPEAKER_GATE=false
      - SPEAKER_THRESHOLD=0.40
      - SPEAKER_MODEL_NAME=wespeaker-zh-cnceleb-resnet34
      - SPEAKER_REFERENCE_DIR=/data/speaker_refs
      - DENOISE=true
      - DENOISE_MODEL_NAME=gtcrn-simple
    labels:
      - "com.wyoming.asr=true"
